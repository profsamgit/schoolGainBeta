<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 130" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="textGradDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&amp;display=swap');
      .brand-title {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 900;
        font-size: 19px;
        fill: url(#textGradDark);
        letter-spacing: 0.08em;
        text-anchor: middle;
      }
      .brand-sub {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 800;
        font-size: 7px;
        fill: #a78bfa;
        letter-spacing: 0.32em;
        text-anchor: middle;
      }
    </style>
  </defs>
  
  <!-- Icon Group -->
  <g transform="translate(55, 15)">
    <rect x="0" y="0" width="50" height="50" rx="14" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="2.2"/>
    <g transform="translate(10, 10)">
      <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z" fill="url(#leafGrad)" fill-opacity="0.85" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Typography Group -->
